services:
  postgres:
    image: postgres:16-alpine
    container_name: cbqa-monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbqa}
      POSTGRES_USER: ${POSTGRES_USER:-cbqa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbqa}
    volumes:
      - cbqa_monitoring_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cbqa} -d ${POSTGRES_DB:-cbqa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cbqa-monitoring-backend
    restart: unless-stopped
    environment:
      PORT: 8090
      DATABASE_URL: postgres://${POSTGRES_USER:-cbqa}:${POSTGRES_PASSWORD:-cbqa}@postgres:5432/${POSTGRES_DB:-cbqa}?sslmode=disable
      XLSX_PATH: /app/workbook.xlsx
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - "./Monitoring Pekerjaan.xlsx:/app/workbook.xlsx:ro"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-web}"
      traefik.http.routers.monitoring-backend.rule: "Host(`${APP_DOMAIN:-monitoring-web.cbqaglobal.co.id}`) && PathPrefix(`/api`)"
      traefik.http.routers.monitoring-backend.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.monitoring-backend.priority: "100"
      traefik.http.routers.monitoring-backend.tls: "true"
      traefik.http.routers.monitoring-backend.tls.certresolver: "myresolver"
      traefik.http.services.monitoring-backend.loadbalancer.server.port: "8090"
    networks:
      - internal
      - traefik

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cbqa-monitoring-frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-web}"
      traefik.http.routers.monitoring-frontend.rule: "Host(`${APP_DOMAIN:-monitoring-web.cbqaglobal.co.id}`)"
      traefik.http.routers.monitoring-frontend.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.monitoring-frontend.priority: "1"
      traefik.http.routers.monitoring-frontend.tls: "true"
      traefik.http.routers.monitoring-frontend.tls.certresolver: "myresolver"
      traefik.http.services.monitoring-frontend.loadbalancer.server.port: "80"
    networks:
      - internal
      - traefik

volumes:
  cbqa_monitoring_pgdata:

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-web}
