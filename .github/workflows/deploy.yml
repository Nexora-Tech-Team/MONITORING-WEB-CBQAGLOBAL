name: Deploy Monitoring Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VPS_HOST: 72.61.209.201
  VPS_USER: root
  VPS_APP_DIR: /root/nexora-node/apps/monitoring-web-cbqaglobal
  VPS_SSH_PORT: "22"
  TRAEFIK_NETWORK: web
  TRAEFIK_ENTRYPOINT: web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: backend
        run: go build ./...

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_SSH_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            --exclude 'backend/bin' \
            --exclude '.github/workflows' \
            -e "ssh -p ${VPS_SSH_PORT}" \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_APP_DIR}/"

      - name: Deploy containers
        run: |
          ssh -p "${VPS_SSH_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "cd '${VPS_APP_DIR}' && TRAEFIK_NETWORK='${TRAEFIK_NETWORK}' TRAEFIK_ENTRYPOINT='${TRAEFIK_ENTRYPOINT}' docker compose -f docker-compose.prod.yml up -d --build --remove-orphans"
